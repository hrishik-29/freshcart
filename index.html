<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FreshCart - Your premium online grocery store. Fresh produce, daily essentials, and organic products delivered to your doorstep." />
  <title>FreshCart — Fresh Groceries, Delivered Fast</title>
  <link rel="icon" type="image/svg+xml" href="/freshcart-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/design-system.css" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <!-- Skip to main content link - Universal Design / Accessibility -->
  <a href="#main-content" class="skip-link" id="skip-nav">Skip to main content</a>

  <!-- App Shell -->
  <div id="app">
    <!-- Navbar injected here -->
    <header id="navbar-container" role="banner"></header>

    <!-- Main content area -->
    <main id="main-content" role="main" tabindex="-1">
      <div id="page-container"></div>
    </main>

    <!-- Footer -->
    <footer id="footer-container" role="contentinfo"></footer>

    <!-- Floating elements -->
    <div id="toast-container" role="alert" aria-live="polite"></div>
    <div id="modal-container" role="dialog" aria-modal="true"></div>
    <div id="chatbot-container"></div>
    <div id="guided-tour-container"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
